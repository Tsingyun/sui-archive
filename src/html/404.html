<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面未找到 - {{SITE_NAME}}</title>
<meta name="description" content="抱歉，您访问的页面不存在。请返回首页或搜索您想找的内容。">
<link rel="canonical" href="{{SITE_URL}}/404">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="/style.css">
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<!-- OG -->
<meta property="og:type" content="website">
<meta property="og:title" content="页面未找到 - {{SITE_NAME}}">
<meta property="og:description" content="抱歉，您访问的页面不存在。">
<meta property="og:url" content="{{SITE_URL}}/404">
<meta property="og:site_name" content="{{SITE_NAME}}">
<meta property="og:locale" content="zh_CN">
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="页面未找到 - {{SITE_NAME}}">
<meta name="twitter:description" content="抱歉，您访问的页面不存在。">
</head>
<body>

<!-- HEADER -->

<main class="main" id="main-content">
  <section class="error-page">
    <div class="container">
      <div class="error-page__content">
        <p class="error-page__code" aria-hidden="true">404</p>
        <h1 class="error-page__title">页面未找到</h1>
        <p class="error-page__message">
          抱歉，您访问的页面不存在或已被移除。<br>
          也许它迷失在了时间的长河中。
        </p>

        <!-- Search Box -->
        <div class="error-page__search" role="search" aria-label="搜索">
          <div class="search-box__input-wrapper">
            <svg class="search-box__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              type="search"
              id="error-search-input"
              class="search-box__input"
              placeholder="搜索动态内容..."
              aria-label="搜索关键词"
              autocomplete="off"
            >
            <a href="/search" class="btn btn--primary btn--sm search-box__btn" id="error-search-btn">搜索</a>
          </div>
        </div>

        <!-- Quick Navigation -->
        <nav class="error-page__nav" aria-label="快速导航">
          <h2 class="error-page__nav-title">或者，你可以去这些地方看看</h2>
          <ul class="error-page__links">
            <li><a href="/" class="btn btn--outline">返回首页</a></li>
            <li><a href="/timeline" class="btn btn--outline">浏览时间轴</a></li>
            <li><a href="/gallery" class="btn btn--outline">查看画廊</a></li>
            <li><a href="/tags" class="btn btn--outline">标签云</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </section>
</main>

<!-- FOOTER -->

<script type="module" src="/js/router.js"></script>
</body>
</html>
