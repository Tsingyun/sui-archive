<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间轴 - {{SITE_NAME}}</title>
<meta name="description" content="以时间轴形式浏览岁己SUI的所有动态，按年份、月份和日期分层查看。">
<link rel="canonical" href="{{SITE_URL}}/timeline">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="/style.css">
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<!-- OG -->
<meta property="og:type" content="website">
<meta property="og:title" content="时间轴 - {{SITE_NAME}}">
<meta property="og:description" content="以时间轴形式浏览岁己SUI的所有动态，按年份、月份和日期分层查看。">
<meta property="og:url" content="{{SITE_URL}}/timeline">
<meta property="og:site_name" content="{{SITE_NAME}}">
<meta property="og:locale" content="zh_CN">
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="时间轴 - {{SITE_NAME}}">
<meta name="twitter:description" content="以时间轴形式浏览岁己SUI的所有动态，按年份、月份和日期分层查看。">
</head>
<body>

<!-- HEADER -->

<main class="main" id="main-content">
  <section class="section">
    <div class="container">
      <h1 class="section__title">时间轴</h1>
      <p class="section__desc">按时间顺序浏览所有动态</p>

      <!-- Year List -->
      <nav class="timeline-years" aria-label="年份导航">
        <ul id="timeline-year-list" class="timeline-years__list" role="list"></ul>
      </nav>

      <!-- Month Breakdown -->
      <div id="timeline-months" class="timeline-months" aria-label="月份列表">
        <p class="timeline-months__placeholder">请选择一个年份查看月份详情</p>
      </div>

      <!-- Day Drill-down -->
      <div id="timeline-days" class="timeline-days" aria-label="日期详情" hidden>
        <div class="timeline-days__header">
          <button class="btn btn--ghost btn--sm" id="timeline-back-btn" type="button" aria-label="返回月份视图">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            返回
          </button>
          <h2 id="timeline-days-title" class="timeline-days__title"></h2>
        </div>
        <div id="timeline-day-posts" class="post-list" role="feed" aria-label="当日动态"></div>
      </div>
    </div>
  </section>
</main>

<!-- FOOTER -->

<script type="module" src="/js/app.js"></script>
</body>
</html>
