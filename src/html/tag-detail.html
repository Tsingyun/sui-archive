<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TAG_NAME}} - {{SITE_NAME}}</title>
<meta name="description" content="浏览带有「{{TAG_NAME}}」标签的岁己SUI动态内容。{{TAG_DESCRIPTION}}">
<link rel="canonical" href="{{CANONICAL_URL}}">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="/style.css">
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<!-- OG -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{TAG_NAME}} - {{SITE_NAME}}">
<meta property="og:description" content="浏览带有「{{TAG_NAME}}」标签的岁己SUI动态内容。">
<meta property="og:url" content="{{CANONICAL_URL}}">
<meta property="og:site_name" content="{{SITE_NAME}}">
<meta property="og:locale" content="zh_CN">
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TAG_NAME}} - {{SITE_NAME}}">
<meta name="twitter:description" content="浏览带有「{{TAG_NAME}}」标签的岁己SUI动态内容。">
</head>
<body>

<!-- HEADER -->

<main class="main" id="main-content">
  <section class="section">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="面包屑导航">
        <ol class="breadcrumb__list">
          <li class="breadcrumb__item"><a href="/" class="breadcrumb__link">首页</a></li>
          <li class="breadcrumb__item breadcrumb__separator" aria-hidden="true">/</li>
          <li class="breadcrumb__item"><a href="/tags" class="breadcrumb__link">标签</a></li>
          <li class="breadcrumb__item breadcrumb__separator" aria-hidden="true">/</li>
          <li class="breadcrumb__item breadcrumb__current" aria-current="page">{{TAG_NAME}}</li>
        </ol>
      </nav>

      <!-- Tag Header -->
      <header class="tag-detail__header">
        <h1 class="section__title">
          <span class="tag-detail__icon" aria-hidden="true">#</span>
          {{TAG_NAME}}
        </h1>
        <p class="section__desc">{{TAG_DESCRIPTION}}</p>
        <p class="tag-detail__count" id="tag-post-count" aria-live="polite"></p>
      </header>

      <!-- Tag Post List -->
      <div id="tag-post-list" class="post-list" role="feed" aria-label="标签下的动态列表"></div>

    </div>
  </section>
</main>

<!-- FOOTER -->

<script type="module" src="/js/app.js"></script>
</body>
</html>
