<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页 - {{SITE_NAME}}</title>
<meta name="description" content="{{SITE_DESCRIPTION}}">
<link rel="canonical" href="{{SITE_URL}}/">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="/style.css">
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<!-- OG -->
<meta property="og:type" content="website">
<meta property="og:title" content="首页 - {{SITE_NAME}}">
<meta property="og:description" content="{{SITE_DESCRIPTION}}">
<meta property="og:url" content="{{SITE_URL}}/">
<meta property="og:site_name" content="{{SITE_NAME}}">
<meta property="og:locale" content="zh_CN">
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="首页 - {{SITE_NAME}}">
<meta name="twitter:description" content="{{SITE_DESCRIPTION}}">
</head>
<body>

<!-- HEADER -->

<main class="main" id="main-content">
  <!-- Masthead -->
  <header class="masthead">
    <div class="container">
      <div class="masthead__meta">
        <span class="masthead__edition">Vol. I</span>
        <span class="masthead__divider" aria-hidden="true">|</span>
        <span class="masthead__date">{{BUILD_DATE}}</span>
        <span class="masthead__divider" aria-hidden="true">|</span>
        <span class="masthead__tagline">数字档案馆</span>
      </div>
      <h1 class="masthead__title">
        岁己 <span class="masthead__title-en">SUI</span> Archive
      </h1>
      <p class="masthead__subtitle">虚拟主播岁己SUI的完整数字档案 — 永久保存每一条动态、每一张图片、每一个瞬间。</p>
      <div class="masthead__rule" aria-hidden="true"></div>
    </div>
  </header>

  <!-- Year Selector -->
  <section class="section" aria-label="按年份浏览">
    <div class="container">
      <div id="year-tabs" class="year-tabs" role="tablist" aria-label="按年份浏览"></div>
    </div>
  </section>

  <!-- Post List -->
  <section class="section" aria-label="动态列表">
    <div class="container">
      <div id="post-list" class="post-list" role="feed" aria-label="动态列表"></div>
      <div id="scroll-sentinel" class="scroll-sentinel" aria-hidden="true"></div>
    </div>
  </section>
</main>

<!-- FOOTER -->

<script type="module" src="/js/app.js"></script>
</body>
</html>
