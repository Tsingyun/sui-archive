name = "sui-archive-images"
main = "worker.js"
compatibility_date = "2024-12-01"

# R2 bucket binding for image storage
[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "sui-archive-images"

# Custom domain route — maps archive.suijisui.uk/images/* to this Worker.
# Uncomment after adding suijisui.uk to Cloudflare and setting CLOUDFLARE_ZONE_ID.
# [[routes]]
# pattern = "archive.suijisui.uk/images/*"
# zone_name = "suijisui.uk"

# Production environment variables
[vars]
ENVIRONMENT = "production"
